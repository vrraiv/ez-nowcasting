# Central project settings shared across discovery, download, transforms, and modeling.

[geography]
aggregate = "EA20"
members = [
    "AT",
    "BE",
    "CY",
    "DE",
    "EE",
    "ES",
    "FI",
    "FR",
    "GR",
    "HR",
    "IE",
    "IT",
    "LT",
    "LU",
    "LV",
    "MT",
    "NL",
    "PT",
    "SI",
    "SK",
]

[date_range]
start = "2000-01-01"
end = "2026-03-31"

[preferred_units]
quarterly_gdp = "CLV10_MEUR"
industrial_production = "I15"
retail_trade = "I15"
unemployment = "PC_ACT"
hicp = "RCH_A"
oil_balance = "THS_T"

[datasets]
quarterly_gdp = "namq_10_gdp"
industrial_production = "sts_inpr_m"
retail_trade = "sts_trtu_m"
unemployment = "une_rt_m"
hicp = "prc_hicp_midx"
oil_balance = "nrg_cb_oilm"

[download]
timeout_seconds = 30.0
user_agent = "eurozone-nowcasting/0.1.0"
max_retries = 3
retry_backoff_seconds = 1.0
cache_dir = "data_raw/cache/http"

[eurostat_api]
base_url = "https://ec.europa.eu/eurostat/api/dissemination/sdmx/3.0"
statistics_base_url = "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data"
agency_id = "ESTAT"
dataflow_version = "1.0"
language = "en"
structure_reports_dir = "outputs/structure_reports"
search_results_dir = "outputs/discovery"
default_search_limit = 10

[paths]
raw_data_dir = "data_raw"
processed_data_dir = "data_processed"
outputs_dir = "outputs"
