deferred_concepts:
  transport_freight_proxy:
    reason: >
      The clean monthly candidate found in Eurostat is AVIA_GOOA, but it is airport-level rather than
      country-level and would require expanding hundreds of rep_airp codes into an aggregation map.
      That makes the baseline filter set less exact and harder to maintain, so it is deferred.
